<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlintyCo - Newsletter Signup</title>
    <link rel="icon" href="Images/logo.png">
    <link rel="stylesheet" href="CSS/portfolio.css">
</head>
<body onload="alert('Welcome to the FlintyCo Ltd. - Newsletter Signup')">
    <header class="form_header">
        <h1>FlintyCo Newsletter Signup</h1>
    </header>
    <main class="form_wrapper">   
        <h3 class="form_welcome">Join our newsletter for exclusive deals and stay updated about our new collections</h3> 
        <p class="required_text">Fields marked with * are required</p>
        <form action="https://httpbin.org/post" method="post" onsubmit="return validateForm()">  <!--When user clicks submit, posts the form output in httpbin.org-->
            <p>
                <label for="firstName">First Name*</label><br>
                <input type="text" id="firstName" name="firstName" maxlength="60" size="40"><!--Input for first name-->
            </p>
            <p>
                <label for="lastName">Last Name*</label><br>
                <input type="text" id="lastName" name="lastName" maxlength="60" size="40"><!--Input for last name-->
            </p>
            <p>
                <label for="email">Email Address*</label><br>
                <input type="email" id="email" name="email" maxlength="60" size="40"><!--Input for email-->
            </p>
            <!--Radio selection input-->
            <p>
                <label class="age" for="Age">Age range</label><br>
                <input type="radio" name="age" value="15-25"> 15-25<br>
                <input type="radio" name="age" value="26-35"> 26-35<br>
                <input type="radio" name="age" value="36-45"> 36-45<br>
                <input type="radio" name="age" value="46-55"> 46-55<br>
                <input type="radio" name="age" value="55+"> 55+
            </p>
            <!--checkbox selection input-->
            <p>
                <label class="interest" for="Interests">Areas of Interest</label><br>
                <input type="checkbox" name="service" value="Luxury"> Luxury Design<br>
                <input type="checkbox" name="service" value="Gold"> Gold Jewelry<br>
                <input type="checkbox" name="service" value="Diamond"> Diamond Jewelry<br>
                <input type="checkbox" name="service" value="Everyday"> Everyday wear<br>
                <input type="checkbox" name="service" value="Engraved"> Engraved Jewelry<br>
            </p>
            <!--Input for comments-->
            <p>
                <label for="comments">Additional Comments:</label><br>
                <textarea id="comments" name="comments" cols="60" rows="3"></textarea>
            </p>
            <!--buttons-->
            <p>
                <button type="submit">Submit</button><!--Submits the form-->
                <button type="reset">Reset</button><!--Resets all the fields, makes them empty-->
            </p>
        </form>
    </main>
    <script>
        function validateForm() {
            first = document.getElementById('firstName').value.trim();
            last = document.getElementById('lastName').value.trim();
            email = document.getElementById('email').value.trim();
            if (first === "" || last === "") {
                alert("Error: First Name and Last Name must not be left blank.");
                return false; /*Blocks form submission if names are empty*/
            }
            if (email === "") {
                alert("Error: You must enter a valid email address to join our newsletter.");
                return false; /*Blocks form submission if there is no email*/
            }
            if (/\d/.test(first) || /\d/.test(last)) {
                alert("Error: Names cannot contain numbers.");
                return false; /*Blocks form submission if a number is typed*/
            }
            return true; 
            }
    </script>
</body>
</html>
